name: build-exe

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build EXE
        run: pyinstaller --noconfirm packet_loss_tester.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacketLossTester-windows-x64
          path: dist/PacketLossTester.exe

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PacketLossTester.exe
